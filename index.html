<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aarudram Registration Form</title>
    <meta name="description" content="Official registration form for Aarudram members">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="form-container">
        <div class="form-header">
            <div class="logo-container">
                <img src="Aarudran_logo.png" alt="Aarudram Logo" class="logo">
            </div>
            <h1>Aarudram Registration Form</h1>
            <p>Please provide your details below to register.</p>
        </div>

        <form id="registrationForm" class="registration-form">

            <!-- Section: Photo -->
            <div class="form-section photo-upload-section">
                <label for="photo" class="photo-upload-label" title="Upload Photo">
                    <div class="photo-preview" id="photoPreview">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z">
                            </path>
                            <circle cx="12" cy="13" r="4"></circle>
                        </svg>
                        <span>Upload Photo</span>
                    </div>
                </label>
                <input type="file" id="photo" name="photo" accept="image/*" class="sr-only">
            </div>

            <!-- Section: Personal Details -->
            <div class="form-group-title">Personal Details</div>

            <div class="form-row">
                <div class="input-group">
                    <label for="name">Name of Member <span class="required">*</span></label>
                    <input type="text" id="name" name="name" placeholder="Enter full name" required>
                </div>
                <div class="input-group">
                    <label for="age">Age <span class="required">*</span></label>
                    <input type="number" id="age" name="age" placeholder="Enter age" min="1" max="150" required>
                </div>
            </div>

            <div class="form-row">
                <div class="input-group">
                    <label for="aadhaar">Aadhaar Number <span class="required">*</span></label>
                    <input type="text" id="aadhaar" name="aadhaar" placeholder="12-digit Aadhaar number"
                        pattern="\d{12}" title="Please enter exactly 12 digits" required>
                </div>
                <div class="input-group">
                    <label for="qualification">Qualification <span class="required">*</span></label>
                    <input type="text" id="qualification" name="qualification" placeholder="Highest qualification"
                        required>
                </div>
            </div>

            <!-- Section: Professional Details -->
            <div class="form-group-title">Professional Details</div>
            <div class="form-row">
                <div class="input-group full-width">
                    <label for="business_nature">Nature of Business or Job <span class="required">*</span></label>
                    <input type="text" id="business_nature" name="business_nature"
                        placeholder="Describe your profession or business" required>
                </div>
            </div>

            <!-- Section: Address Details -->
            <div class="form-group-title">Address Details</div>
            <div class="form-row">
                <div class="input-group full-width">
                    <label for="business_address">Business Address</label>
                    <textarea id="business_address" name="business_address" rows="3"
                        placeholder="Enter business address"></textarea>
                </div>
            </div>
            <div class="form-row">
                <div class="input-group full-width" style="position: relative;">
                    <label for="residential_address">Residential Address <span class="required">*</span></label>
                    <textarea id="residential_address" name="residential_address" rows="3"
                        placeholder="Enter residential address" required></textarea>

                    <div class="checkbox-wrapper">
                        <input type="checkbox" id="same_address" onchange="copyAddress()">
                        <label for="same_address">Same as Business Address</label>
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="submit-btn">Submit Registration</button>
            </div>
        </form>
    </div>

    <script>
        // Photo preview logic
        document.getElementById('photo').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    const preview = document.getElementById('photoPreview');
                    preview.style.backgroundImage = `url(${e.target.result})`;
                    preview.style.backgroundSize = 'cover';
                    preview.style.backgroundPosition = 'center';
                    preview.innerHTML = ''; // clear text/icon
                    preview.style.border = '2px solid var(--primary-color)';
                }
                reader.readAsDataURL(file);
            }
        });

        // Copy address logic
        function copyAddress() {
            const isChecked = document.getElementById('same_address').checked;
            const businessAddr = document.getElementById('business_address').value;
            const residentialAddr = document.getElementById('residential_address');

            if (isChecked) {
                residentialAddr.value = businessAddr;
                // Add a small highlight animation to show it was copied
                residentialAddr.style.backgroundColor = 'var(--bg-color)';
                setTimeout(() => {
                    residentialAddr.style.backgroundColor = 'var(--surface-color)';
                }, 300);
            } else {
                residentialAddr.value = '';
            }
        }
        // Form submission logic
        document.getElementById('registrationForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const submitBtn = document.querySelector('.submit-btn');
            const originalText = submitBtn.textContent;
            submitBtn.textContent = 'Submitting...';
            submitBtn.disabled = true;

            const formData = new FormData(this);

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (response.ok) {
                    alert('Registration successful!');
                    this.reset();
                    document.getElementById('photoPreview').style.backgroundImage = 'none';
                    document.getElementById('photoPreview').innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg><span>Upload Photo</span>';
                    document.getElementById('photoPreview').style.border = '2px dashed #cbd5e1';
                } else {
                    alert('Error: ' + (result.error || 'Failed to submit form'));
                }
            } catch (error) {
                console.error('Error submitting form:', error);
                alert('An error occurred while submitting the form. Please try again.');
            } finally {
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
